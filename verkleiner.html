<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Foto Verkleiner</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="container">
        <h2>Foto Verkleiner</h2>
        <p>Maak je afbeeldingen lichter zonder kwaliteitsverlies.</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <div id="status">Wachtend op bestand...</div>
        <br>
        <a id="downloadBtn">Download Verkleinde Foto</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
